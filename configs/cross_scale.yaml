# PRISM — Cross-Scale Proxy Validation
# Rotational Regime: W ∈ O(d), Procrustes alignment.
#
# Target = large model from a family (7B / 8B / 9B / 12B).
# Proxy  = smaller models from the same family (0.6B, 1.7B, 2B, 4B, …).
#
# The experiment measures whether PRISM metrics computed on a small proxy
# reliably predict the target model's risk, enabling cheap surrogate search.
#
# Tokenizer policy
# ----------------
# Each model (target and proxy) is evaluated using its OWN tokenizer on the
# same raw text documents.  cross_scale.py automatically detects whether
# tokenizers are identical and reuses the target dataloader for efficiency.
#
# Usage (default — Qwen3 family):
#   python run.py --config configs/cross_scale.yaml
#
# Usage (Gemma-3 family):
#   python run.py --config configs/cross_scale.yaml \
#       target.model=google/gemma-3-12b-pt \
#       'proxy.models=[google/gemma-3-270m,google/gemma-3-1b-pt,google/gemma-3-4b-pt]' \
#       data.max_length=512
#
# Usage (override dataset):
#   python run.py --config configs/cross_scale.yaml data.task=c4
#
# Supported model families:
#
#   Qwen3        : Qwen/Qwen3-0.6B, Qwen/Qwen3-1.7B, Qwen/Qwen3-4B
#                  → Qwen/Qwen3-8B  (Qwen3 tokenizer, vocab=151K)
#
#   Llama-2      : TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T
#                  + mistralai/Mistral-7B-v0.1  (cross-arch, same vocab=32K)
#                  → NousResearch/Llama-2-7b-hf  (LlamaTokenizer, vocab=32K)
#
#   Mistral      : TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T
#                  + NousResearch/Llama-2-7b-hf  (cross-arch, same vocab=32K)
#                  → mistralai/Mistral-7B-v0.1  (LlamaTokenizer, vocab=32K)
#
#   Ministral-3  : mistralai/Ministral-3-3B-Base-2512  [no HF auth required]
#                  → mistralai/Ministral-3-8B-Base-2512
#                  (Tekken v7 tokenizer, vocab=131K; publicly accessible)
#
#   Gemma-2      : google/gemma-2-2b                   [Google HF auth required]
#                  → google/gemma-2-9b
#                  (Gemma SentencePiece tokenizer, vocab=256K)
#
#   Gemma-3      : google/gemma-3-270m, google/gemma-3-1b-pt, google/gemma-3-4b-pt
#                  → google/gemma-3-12b-pt              [Google HF auth required]
#                  (Gemma3 tokenizer, vocab=256K)
#                  270M and 1B: text-only (Gemma3ForCausalLM)
#                  4B, 12B: multimodal (Gemma3ForConditionalGeneration)
#                  LLMExtractor handles both via _get_backbone / extract_head.

experiment: cross_scale

target:
  model: Qwen/Qwen3-8B-Base
  extractor: llm

proxy:
  extractor: llm
  # List of proxy models (same family, smaller scale).
  # Each entry can be a plain model ID string, or a dict with
  # 'model' and optional 'label' keys.
  models:
    - Qwen/Qwen3-0.6B-Base
    - Qwen/Qwen3-1.7B-Base
    - Qwen/Qwen3-4B-Base

data:
  task: wikitext
  split: test
  num_samples: 128
  batch_size: 4
  max_length: 512

alignment:
  scale_absorbed: false   # true → ε_feat = √(2(1−Ω)), scale folded into head

output:
  dir: ./results/cross_scale

computing:
  offload_to_cpu: true     # set false on L40/A100 (≥40GB) for ~2-3x speedup
  logit_chunk_size: 512    # increase to 2048 on high-VRAM GPUs
  model_dtype: bfloat16    # bf16 is the experiment standard

device: cuda
seed: 42
