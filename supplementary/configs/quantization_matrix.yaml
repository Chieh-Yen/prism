datasets:
  - mmlu
  - arc
  - triviaqa
  - squad
  - gsm8k

models:
  - id: qwen3_8b_instruct
    target_model: Qwen/Qwen3-8B
    proxy_model: Qwen/Qwen3-8B-GGUF
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      - gptq:Efficient-ML/Qwen3-8B-gptq-w4-128
      - gptq:Efficient-ML/Qwen3-8B-gptq-w8-128
      - gptq:Efficient-ML/Qwen3-8B-gptq-w4-perchannel
      - gptq:Efficient-ML/Qwen3-8B-gptq-w8-perchannel
      - gptq:JunHowie/Qwen3-8B-GPTQ-Int8
      - gptq:RedHatAI/Qwen3-8B-quantized.w4a16
      # - awq:Qwen/Qwen3-8B-AWQ  # AWQ excluded from current study

  - id: llama31_8b_instruct
    target_model: meta-llama/Meta-Llama-3.1-8B-Instruct
    proxy_model: bartowski/Meta-Llama-3.1-8B-Instruct-GGUF
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      - gptq:hugging-quants/Meta-Llama-3.1-8B-Instruct-GPTQ-INT4
      - gptq:ModelCloud/Meta-Llama-3.1-8B-Instruct-gptq-4bit
      - gptq:shuyuej/Meta-Llama-3.1-8B-Instruct-GPTQ
      # - awq:hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4  # AWQ excluded

  - id: ministral3_8b_instruct
    target_model: mistralai/Ministral-3-8B-Instruct-2512
    proxy_model: bartowski/mistralai_Ministral-3-8B-Instruct-2512-GGUF
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      # - awq:cyankiwi/Ministral-3-8B-Instruct-2512-AWQ-4bit  # AWQ excluded

  - id: deepseek_r1_distill_llama_8b
    target_model: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
    proxy_model: bartowski/DeepSeek-R1-Distill-Llama-8B-GGUF
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      - gptq:jakiAJK/DeepSeek-R1-Distill-Llama-8B_GPTQ-int4
      # - awq:casperhansen/deepseek-r1-distill-llama-8b-awq  # AWQ excluded

  - id: qwen3_8b_base
    target_model: Qwen/Qwen3-8B-Base
    proxy_model: mradermacher/Qwen3-8B-Base-GGUF
    gguf_template: Qwen3-8B-Base.{quant}.gguf
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      - gptq:Efficient-ML/Qwen3-8B-base-gptq-w4-128
      - gptq:Efficient-ML/Qwen3-8B-base-gptq-w8-128
      - gptq:Efficient-ML/Qwen3-8B-base-gptq-w4-perchannel
      - gptq:Efficient-ML/Qwen3-8B-base-gptq-w8-perchannel
      - gptq:AlphaGaO/Qwen3-8B-GPTQ

  - id: llama31_8b_base
    target_model: meta-llama/Meta-Llama-3.1-8B
    proxy_model: QuantFactory/Meta-Llama-3.1-8B-GGUF
    gguf_template: Meta-Llama-3.1-8B.{quant}.gguf
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4
      - gptq:ModelCloud/Meta-Llama-3.1-8B-gptq-4bit
      - gptq:shuyuej/Meta-Llama-3.1-8B-GPTQ
      # - awq:UCLA-EMC/Meta-Llama-3.1-8B-AWQ-INT4  # AWQ excluded

  - id: ministral3_8b_base
    target_model: mistralai/Ministral-3-8B-Base-2512
    proxy_model: mradermacher/Ministral-3-8B-Base-2512-GGUF
    gguf_template: Ministral-3-8B-Base-2512.{quant}.gguf
    quantization_bits:
      - dtype:float16
      - Q8_0
      - Q6_K
      - Q5_K_M
      - Q4_K_M
      - Q3_K_M
      - Q2_K
      - bnb:int8
      - bnb:nf4
      - bnb:fp4


